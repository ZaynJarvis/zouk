# First time:  bash docker/setup.sh [--emb-key <key>] [--vlm-key <key>]
# After that:  docker compose up -d

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zouk}
      POSTGRES_USER: ${POSTGRES_USER:-zouk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zouk}
    volumes:
      - ./data/postgres:/var/lib/pgsql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zouk} -d ${POSTGRES_DB:-zouk}"]
      interval: 3s
      retries: 10

  openviking:
    image: ghcr.io/volcengine/openviking:main
    volumes:
      - ./data/openviking:/app/.openviking
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  server:
    image: ${ZOUK_IMAGE:-ghcr.io/t0saki/zouk:latest}
    ports:
      - "${PORT:-7777}:7777"
    environment:
      PORT: "7777"
      NODE_ENV: production
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:7777}
      DATABASE_URL: postgresql://${POSTGRES_USER:-zouk}:${POSTGRES_PASSWORD:-zouk}@postgres:5432/${POSTGRES_DB:-zouk}
      DATABASE_SSL: "false"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ALLOW: ${ALLOW:-}
      ZOUK_SUPERUSERS: ${ZOUK_SUPERUSERS:-}
      ZOUK_GUEST_ELEVATED: ${ZOUK_GUEST_ELEVATED:-}
      OPENVIKING_URL: ${OPENVIKING_ROOT_KEY:+http://openviking:1933}
      OPENVIKING_ROOT_KEY: ${OPENVIKING_ROOT_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      openviking:
        condition: service_healthy
    restart: unless-stopped
